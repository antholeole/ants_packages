name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: date_time_converter
            tool: dart
            cmd: analyze
          - package: uuid_type_next
            tool: dart
            cmd: test
          - package: local_data_manager
            tool: flutter
            cmd: test
          - package: toastr
            tool: flutter
            cmd: test
          - package: local_user
            tool: flutter
            cmd: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: ${{ matrix.package }}
        run: nix develop --command bash -c "cd ${{ matrix.package }} && ${{ matrix.tool }} pub get && ${{ matrix.tool }} ${{ matrix.cmd }}"
